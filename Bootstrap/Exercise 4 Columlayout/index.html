<!DOCTYPE html>

<head>

    <title>Exercise 4.1</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 bg-dark text-white p-4">

                <h3>Sidebar</h3>

                <ul class="list-unstyled">
                    <li>Home</li>
                    <li>Profile</li>
                    <li>Settings</li>
                    <li>Logout</li>

            </div>

            <!-- Content Area -->
            <div class="col-md-9 bg-light p-4">

                <h2>Main Content</h2>

                <p>
                    This is the main content area created using Bootstrap grid system.
                </p>

                <p>
                    The sidebar takes 3 columns and the content area takes 9 columns.
                </p>

            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
