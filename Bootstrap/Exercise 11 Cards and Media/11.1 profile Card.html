<!DOCTYPE html>
<html>
<head>
<title>Creative Profile Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#4e54c8,#8f94fb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:350px;
border:none;
border-radius:20px;
overflow:hidden;
}

.profile-img{
width:140px;
height:140px;
object-fit:cover;
border:5px solid white;
margin-top:-70px;
}
</style>

</head>
<body>

<div class="card shadow-lg text-center">

<img src="banner.jpg" height="180">

<div class="card-body">

<img src="profile.jpg" class="rounded-circle profile-img">

<h3 class="mt-3"> John </h3>

<p class="text-muted">
Frontend Developer 
</p>

<button class="btn btn-primary rounded-pill">
Follow
</button>

<button class="btn btn-outline-dark rounded-pill">
Message
</button>

</div>
</div>

</body>
</html>
