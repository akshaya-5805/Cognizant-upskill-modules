<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 7.1</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <!-- Display Heading -->
        <h1 class="display-1 text-primary">
            Bootstrap Typography
        </h1>

        <!-- Lead Paragraph -->
        <p class="lead">
            This is a lead paragraph using Bootstrap typography utilities.
        </p>

        <!-- Muted Text -->
        <p class="text-muted">
            This text appears muted and light gray.
        </p>

        <!-- Bold Text -->
        <p class="fw-bold">
            This text is bold using fw-bold class.
        </p>

        <!-- Italic Text -->
        <p class="fst-italic">
            This text is italic.
        </p>

        <!-- Uppercase Text -->
        <p class="text-uppercase">
            bootstrap typography example
        </p>

        <!-- Colored Text -->
        <p class="text-success">
            This is success colored text.
        </p>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
